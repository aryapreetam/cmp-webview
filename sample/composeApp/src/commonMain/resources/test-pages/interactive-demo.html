<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Demo</title>
  <style>
      body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          padding: 20px;
          max-width: 600px;
          margin: 0 auto;
          background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
          color: white;
      }

      .container {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 20px;
          backdrop-filter: blur(10px);
      }

      h1 {
          margin-top: 0;
      }

      .interactive-section {
          margin: 20px 0;
          padding: 16px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 8px;
      }

      button {
          background: white;
          color: #4facfe;
          border: none;
          padding: 10px 20px;
          border-radius: 8px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          margin: 4px;
      }

      .display {
          font-size: 36px;
          text-align: center;
          margin: 16px 0;
          font-weight: bold;
      }

      input[type="range"] {
          width: 100%;
          margin: 16px 0;
      }

      .message-log {
          max-height: 200px;
          overflow-y: auto;
          background: rgba(0, 0, 0, 0.2);
          padding: 12px;
          border-radius: 8px;
          font-size: 12px;
          font-family: monospace;
      }
  </style>
</head>
<body>
<div class="container">
  <h1>🎮 Interactive Demo</h1>

  <div class="interactive-section">
    <h3>Counter</h3>
    <div class="display" id="counter">0</div>
    <button onclick="increment()">➕ Increment</button>
    <button onclick="decrement()">➖ Decrement</button>
    <button onclick="reset()">🔄 Reset</button>
  </div>

  <div class="interactive-section">
    <h3>Color Selector</h3>
    <button onclick="selectColor('red')" style="background: #ff4757;">Red</button>
    <button onclick="selectColor('green')" style="background: #2ecc71;">Green</button>
    <button onclick="selectColor('blue')" style="background: #3498db;">Blue</button>
    <button onclick="selectColor('purple')" style="background: #9b59b6;">Purple</button>
  </div>

  <div class="interactive-section">
    <h3>Slider Value: <span id="sliderValue">50</span></h3>
    <input type="range" min="0" max="100" value="50" oninput="updateSlider(this.value)">
  </div>

  <div class="interactive-section">
    <h3>Message Log</h3>
    <div class="message-log" id="messageLog">Ready to send messages...</div>
  </div>
</div>

<script>
  let counter = 0;

  function sendMessage(type, data) {
    if (!window.ComposeWebViewBridge) {
      logMessage('❌ Bridge not available');
      return;
    }

    const message = JSON.stringify({
      type: type,
      data: data,
      timestamp: Date.now()
    });

    try {
      window.ComposeWebViewBridge.postMessage(message);
      logMessage('✅ Sent: ' + type);
    } catch (error) {
      logMessage('❌ Error: ' + error.message);
    }
  }

  function increment() {
    counter++;
    document.getElementById('counter').textContent = counter;
    sendMessage('counter_change', {value: counter, action: 'increment'});
  }

  function decrement() {
    counter--;
    document.getElementById('counter').textContent = counter;
    sendMessage('counter_change', {value: counter, action: 'decrement'});
  }

  function reset() {
    counter = 0;
    document.getElementById('counter').textContent = counter;
    sendMessage('counter_change', {value: counter, action: 'reset'});
  }

  function selectColor(color) {
    sendMessage('color_selected', {color: color});
  }

  function updateSlider(value) {
    document.getElementById('sliderValue').textContent = value;
    sendMessage('slider_change', {value: parseInt(value)});
  }

  function logMessage(msg) {
    const log = document.getElementById('messageLog');
    const time = new Date().toLocaleTimeString();
    log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
  }

  // Listen for bridge ready
  document.addEventListener('ComposeWebViewBridgeReady', function () {
    logMessage('🌉 Bridge is ready!');
  });

  if (window.ComposeWebViewBridge) {
    logMessage('🌉 Bridge is ready!');
  }
</script>
</body>
</html>
