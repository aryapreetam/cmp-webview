<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Demo</title>
  <style>
      body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          padding: 20px;
          max-width: 600px;
          margin: 0 auto;
          background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
          color: white;
      }

      .container {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 20px;
          backdrop-filter: blur(10px);
      }

      h1 {
          margin-top: 0;
      }

      .form-group {
          margin: 16px 0;
      }

      label {
          display: block;
          margin-bottom: 8px;
          font-weight: 600;
      }

      input, select, textarea {
          width: 100%;
          padding: 12px;
          border: none;
          border-radius: 8px;
          box-sizing: border-box;
          font-size: 16px;
          font-family: inherit;
      }

      button {
          background: white;
          color: #f5576c;
          border: none;
          padding: 12px 24px;
          border-radius: 8px;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          width: 100%;
          margin-top: 16px;
      }

      .status {
          margin-top: 16px;
          padding: 12px;
          border-radius: 8px;
          background: rgba(255, 255, 255, 0.2);
      }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 Form Submission Demo</h1>

  <form id="userForm" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label for="country">Country:</label>
      <select id="country">
        <option value="US">United States</option>
        <option value="UK">United Kingdom</option>
        <option value="CA">Canada</option>
        <option value="IN">India</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message:</label>
      <textarea id="message" rows="4"></textarea>
    </div>

    <button type="submit">Submit Form</button>
  </form>

  <div id="status" class="status" style="display: none;"></div>
</div>

<script>
  function handleSubmit(event) {
    event.preventDefault();

    const formData = {
      type: 'form_submission',
      data: {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        country: document.getElementById('country').value,
        message: document.getElementById('message').value,
        timestamp: new Date().toISOString()
      }
    };

    if (window.ComposeWebViewBridge) {
      try {
        window.ComposeWebViewBridge.postMessage(JSON.stringify(formData));
        showStatus('✅ Form submitted successfully!', 'success');
        document.getElementById('userForm').reset();
      } catch (error) {
        showStatus('❌ Error: ' + error.message, 'error');
      }
    } else {
      showStatus('❌ Bridge not available', 'error');
    }
  }

  function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.style.display = 'block';
    statusDiv.style.background = type === 'success'
      ? 'rgba(72, 187, 120, 0.3)'
      : 'rgba(245, 101, 101, 0.3)';
  }
</script>
</body>
</html>
